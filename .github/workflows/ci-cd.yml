name: Frontend CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./Frontend-CRCoach
        run: npm ci

      - name: Run tests (if any)
        working-directory: ./Frontend-CRCoach
        run: |
          if [ -f package.json ]; then npm test --if-present; fi

      - name: Build production bundle
        working-directory: ./Frontend-CRCoach
        run: npm run build --if-present

  docker_build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build frontend docker image
        run: |
          docker build --file Frontend-CRCoach/Dockerfile -t frontend-crcoach:latest Frontend-CRCoach

      - name: Push image to registry (optional)
        if: ${{ secrets.GHCR_USERNAME && secrets.GHCR_TOKEN }}
        uses: docker/build-push-action@v4
        with:
          context: ./Frontend-CRCoach
          file: ./Frontend-CRCoach/Dockerfile
          push: true
          tags: ${{ secrets.GHCR_USERNAME }}/frontend-crcoach:latest

