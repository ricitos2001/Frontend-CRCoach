name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.13.0'

      - name: Install dependencies
        run: npm install

      - name: Update dependencies
        run: npm update

      - name: Fix vulnerabilities
        run: npm audit fix
