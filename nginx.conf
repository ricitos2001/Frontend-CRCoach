server {
    listen 80;
    server_name _;

    # Servir desde el root donde el Dockerfile copia los ficheros
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------
    # Compresión
    # -------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # -------------------------
    # HTML — NO cachear
    # -------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Si usas SPA (React, Angular, Vue, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------
    # JS y CSS — caché muy larga
    # -------------------------
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # -------------------------
    # Imágenes — caché larga
    # -------------------------
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 6M;
        add_header Cache-Control "public, max-age=15552000";
    }

    # -------------------------
    # Fuentes — caché larga + CORS
    # -------------------------
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        # try_files para evitar 404 silenciosos
        try_files $uri =404;
    }

    # -------------------------
    # Assets genéricos (fallback)
    # -------------------------
    location /assets/ {
        expires 6M;
        add_header Cache-Control "public";
    }

    # -------------------------
    # API (reverse proxy hacia el backend)
    # -------------------------
    location /api/ {
        proxy_pass http://app:8080/; # hostname 'app' debe resolver al servicio backend en la misma red de Docker
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        add_header Cache-Control "no-store";
    }
}
