<section class="toast-container" aria-live="polite">

  @for (t of toasts(); track t.id) {
    <section class="toast" [attr.data-type]="t.type">
      <article class="toast-body">
        <h3 class="toast-message">{{ t.message | translate }}</h3>
        <button class="toast-close" (click)="dismiss(t.id)" aria-label="Cerrar">×</button>
      </article>
    </section>
  }
</section>
