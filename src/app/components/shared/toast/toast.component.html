<section class="toast-container" aria-live="polite">
  <section class="toast" *ngFor="let t of toasts()" [attr.data-type]="t.type">
    <section class="toast-body">
      <!-- Use translate pipe so components can pass translation keys as message -->
      <article class="toast-message">{{ t.message | translate }}</article>
      <button class="toast-close" (click)="dismiss(t.id)" aria-label="Cerrar">×</button>
    </section>
  </section>
</section>
